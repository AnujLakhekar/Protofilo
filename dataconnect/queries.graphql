}

# ==================== TAG QUERIES & MUTATIONS ====================

# Query: Get all tags
query GetAllTags {
  tags {
    __id
    name
  }
}

# Mutation: Create tag
mutation CreateTag($name: String!) {
  createTag(name: $name) {
    __id
    name
  }
}

# ==================== PROJECT MEDIA QUERIES & MUTATIONS ====================

# Query: Get project media
query GetProjectMedia($projectId: String!) {
  projectMedia(projectId: $projectId) {
    __id
    mediaUrl
    mediaType
    caption
    displayOrder
  }
}

# Mutation: Add project media
mutation AddProjectMedia($projectId: String!, $input: CreateProjectMediaInput!) {
  addProjectMedia(projectId: $projectId, input: $input) {
    __id
    mediaUrl
    mediaType
    caption
    displayOrder
  }
}

# Mutation: Delete project media
mutation DeleteProjectMedia($projectId: String!, $mediaUrl: String!) {
  deleteProjectMedia(projectId: $projectId, mediaUrl: $mediaUrl)
}

# ==================== PROJECT TAG MUTATIONS ====================

# Mutation: Link project to tag
mutation LinkProjectTag($projectId: String!, $tagName: String!) {
  linkProjectTag(projectId: $projectId, tagName: $tagName) {
    project {
      __id
      title
    }
    tag {
      __id
      name
    }
  }
}

# Mutation: Unlink project from tag
mutation UnlinkProjectTag($projectId: String!, $tagName: String!) {
  unlinkProjectTag(projectId: $projectId, tagName: $tagName)
}

# ==================== SKILL TAG MUTATIONS ====================

# Mutation: Link skill to tag
mutation LinkSkillTag($skillId: String!, $tagName: String!) {
  linkSkillTag(skillId: $skillId, tagName: $tagName) {
    skill {
      __id
      name
    }
    tag {
      __id
      name
    }
  }
}

# Mutation: Unlink skill from tag
mutation UnlinkSkillTag($skillId: String!, $tagName: String!) {
  unlinkSkillTag(skillId: $skillId, tagName: $tagName)
}
