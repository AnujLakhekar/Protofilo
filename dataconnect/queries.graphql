# ==================== USER QUERIES & MUTATIONS ====================

# Query: Get user by email
query GetUser($email: String!) {
  user(email: $email) {
    __id
    displayName
    email
    bio
    contactEmail
    linkedinUrl
    githubUrl
    photoUrl
  }
}

# Mutation: Upsert user profile
mutation UpsertUser($input: UpsertUserInput!) {
  upsertUser(input: $input) {
    __id
    displayName
    email
    bio
    contactEmail
    linkedinUrl
    githubUrl
    photoUrl
  }
}

# ==================== PROJECT QUERIES & MUTATIONS ====================

# Query: Get all projects for a user
query GetProjects($uid: String!) {
  projects(uid: $uid) {
    __id
    user {
      email
      displayName
    }
    title
    description
    createdAt
    projectUrl
    githubRepoUrl
    displayOrder
  }
}

# Query: Get single project
query GetProject($uid: String!, $id: String!) {
  project(uid: $uid, id: $id) {
    __id
    title
    description
    createdAt
    projectUrl
    githubRepoUrl
    displayOrder
  }
}

# Mutation: Create project
mutation CreateProject($uid: String!, $input: CreateProjectInput!) {
  createProject(uid: $uid, input: $input) {
    __id
    title
    description
    createdAt
    projectUrl
    githubRepoUrl
    displayOrder
  }
}

# Mutation: Update project
mutation UpdateProject($uid: String!, $id: String!, $input: UpdateProjectInput!) {
  updateProject(uid: $uid, id: $id, input: $input) {
    __id
    title
    description
    projectUrl
    githubRepoUrl
    displayOrder
  }
}

# Mutation: Delete project
mutation DeleteProject($uid: String!, $id: String!) {
  deleteProject(uid: $uid, id: $id)
}

# ==================== SKILL QUERIES & MUTATIONS ====================

# Query: Get all skills for a user
query GetSkills($uid: String!) {
  skills(uid: $uid) {
    __id
    user {
      email
    }
    name
    category
    proficiency
  }
}

# Mutation: Create skill
mutation CreateSkill($uid: String!, $input: CreateSkillInput!) {
  createSkill(uid: $uid, input: $input) {
    __id
    name
    category
    proficiency
  }
}

# Mutation: Update skill
mutation UpdateSkill($uid: String!, $id: String!, $input: UpdateSkillInput!) {
  updateSkill(uid: $uid, id: $id, input: $input) {
    __id
    name
    category
    proficiency
  }
}

# Mutation: Delete skill
mutation DeleteSkill($uid: String!, $id: String!) {
